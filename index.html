<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf8;--surface:#fff;--ink:#111;--ink-2:#444;--muted:#888;
  --line:#e8e6e1;--primary:#1a1a2e;--accent:#e8602c;
  --radius:10px;
}
body{
  background:var(--bg);color:var(--ink);
  font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;
  font-size:16px;line-height:1.7;min-height:100vh;
}
/* Nav */
nav{
  border-bottom:1px solid var(--line);background:rgba(250,250,248,.95);
  backdrop-filter:blur(8px);position:sticky;top:0;z-index:100;
}
.nav-inner{max-width:760px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-weight:800;font-size:15px;letter-spacing:-.02em;color:var(--ink);text-decoration:none;padding:14px 0;}
.nav-links{display:flex;gap:0;}
.nav-link{
  font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;
  padding:14px 14px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;
}
.nav-link:hover{color:var(--ink);}
.nav-link.on{color:var(--ink);border-bottom-color:var(--accent);}
/* Hero */
.hero{
  max-width:760px;margin:0 auto;padding:80px 24px 60px;
}
.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:16px;}
h1{font-size:clamp(32px,5vw,52px);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:20px;}
h1 em{color:var(--accent);font-style:normal;}
.hero-desc{font-size:17px;color:var(--ink-2);max-width:520px;line-height:1.7;}
/* Posts */
.posts{max-width:760px;margin:0 auto;padding:0 24px 96px;}
.section-label{
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  font-weight:700;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--line);
}
/* Tabs */
.tab-container{
  display:flex;gap:12px;margin-bottom:32px;overflow-x:auto;padding-bottom:8px;
  border-bottom:1px solid var(--line);
}
.tab-btn{
  padding:8px 16px;border:none;background:transparent;color:var(--muted);
  font-size:13px;font-weight:600;cursor:pointer;transition:color .2s,border-color .2s;
  border-bottom:2px solid transparent;white-space:nowrap;
}
.tab-btn:hover{color:var(--ink);}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--accent);}
.post-list{display:flex;flex-direction:column;gap:0;}
.post-item{
  display:flex;align-items:baseline;justify-content:space-between;gap:16px;
  padding:16px 0;border-bottom:1px solid var(--line);text-decoration:none;
  color:inherit;transition:opacity .15s;
}
.post-item:hover{opacity:.7;}
.post-item:last-child{border-bottom:none;}
.post-item.hidden{display:none;}
.post-title{font-size:16px;font-weight:600;color:var(--ink);}
.post-date{font-size:12px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums;}
.post-tag{
  display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;
  border-radius:4px;background:#f1efe9;color:var(--muted);margin-top:4px;
}
.empty{padding:40px 0;color:var(--muted);font-size:15px;}
/* Footer */
footer{
  border-top:1px solid var(--line);padding:24px;text-align:center;
  font-size:12px;color:var(--muted);
}
footer a{color:var(--muted);text-decoration:none;}
footer a:hover{color:var(--ink);}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="/blog/?utm_source=blog&utm_medium=nav&utm_campaign=home">jemmajeon</a>
    <div class="nav-links">
      <a class="nav-link on" href="/blog/" data-to="blog">블로그</a>
      <a class="nav-link" href="sadang_dashboard.html" data-to="guides">맛집</a>
      <a class="nav-link" href="https://jemmajeon.github.io/wedding_2026/hawaii-trip-dashboard.html" data-to="hawaii">하와이</a>
      <a class="nav-link" href="https://jemmajeon.github.io/wedding_2026/wedding-dashboard.html" data-to="wedding">결혼 준비</a>
    </div>
  </div>
</nav>
<script>
(function(){
  if(!location.hostname.includes('github.io'))return;
  var src='blog';
  var base='https://jemmajeon.github.io/blog/go/?';
  document.querySelectorAll('a[data-to]').forEach(function(a){
    if(a.dataset.to!=='blog') a.href=base+'to='+a.dataset.to+'&utm_source='+src+'&utm_medium=nav';
  });
})();

// 탭 필터 로직
document.addEventListener('DOMContentLoaded', function(){
  var tabBtns = document.querySelectorAll('.tab-btn');
  var guideItems = document.querySelectorAll('#guideList .post-item');

  tabBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      var filter = this.dataset.filter;

      // 탭 활성화
      tabBtns.forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');

      // 아이템 필터
      guideItems.forEach(function(item){
        var category = item.dataset.category;
        if(filter === 'all' || category === filter){
          item.classList.remove('hidden');
        } else {
          item.classList.add('hidden');
        }
      });
    });
  });
});
</script>

      </div>
    </a>
    <a href="https://jemmajeon.github.io/wedding_2026/hawaii-trip-dashboard.html" class="post-item" data-category="travel" style="border-bottom: 1px solid var(--line);">

    </a>
    <a href="https://jemmajeon.github.io/wedding_2026/wedding-dashboard.html" class="post-item" data-category="wedding">
