<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이동 중...</title>
<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LTC8L11Y7J"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

// UTM 파라미터 포함해서 config
const params = new URLSearchParams(location.search);
gtag('config', 'G-LTC8L11Y7J', {
  page_location: location.href,
  campaign_source:   params.get('utm_source')   || undefined,
  campaign_medium:   params.get('utm_medium')   || undefined,
  campaign_name:     params.get('utm_campaign') || undefined,
  campaign_content:  params.get('utm_content')  || undefined,
});

// 목적지 맵
const DEST = {
  hawaii:   'https://jemmajeon.github.io/wedding_2026/hawaii-trip-dashboard.html',
  wedding:  'https://jemmajeon.github.io/wedding_2026/wedding-dashboard.html',
  blog:     'https://jemmajeon.github.io/blog/',
  personal: 'https://jemmajeon.github.io/personal-2026/',
  home:     'https://jemmajeon.github.io/wedding_2026/',
};

const to = params.get('to');
const dest = DEST[to] || DEST.blog;

// GA4 이벤트 기록 후 리다이렉트
gtag('event', 'link_relay', {
  relay_to: to || 'unknown',
  utm_source: params.get('utm_source') || '(direct)',
  utm_medium: params.get('utm_medium') || '(none)',
  utm_campaign: params.get('utm_campaign') || '(none)',
});

// 300ms 후 이동 (GA4 비동기 전송 여유)
setTimeout(() => { location.replace(dest); }, 300);
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:#0f1117;color:#eef0ff;
  font-family:system-ui,sans-serif;
}
.wrap{text-align:center;}
.spinner{
  width:32px;height:32px;border:3px solid #252a42;
  border-top-color:#7c83fc;border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
p{font-size:14px;color:#5a6080;}
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <p>이동 중...</p>
</div>
</body>
</html>
