<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이동 중...</title>
<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LTC8L11Y7J"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

const params = new URLSearchParams(location.search);
gtag('config', 'G-LTC8L11Y7J', { page_location: location.href });

// 목적지 맵 — data.json에서 읽어옴 (Google Sheet → n8n → data.json)
// 직접 수정 X: Sheet의 UTM 관리 탭에서 수정 → n8n 자동 갱신
const FALLBACK = {
  hawaii:   'https://jemmajeon.github.io/wedding_2026/hawaii-trip-dashboard.html',
  wedding:  'https://jemmajeon.github.io/wedding_2026/wedding-dashboard.html',
  blog:     'https://jemmajeon.github.io/blog/',
  home:     'https://jemmajeon.github.io/wedding_2026/',
};

async function go() {
  const to = params.get('to');
  let dest;

  try {
    const res = await fetch('./data.json?_=' + Date.now(), { cache: 'no-store' });
    const map = await res.json();
    dest = map[to] || map.blog;
  } catch {
    dest = FALLBACK[to] || FALLBACK.blog;
  }

  gtag('event', 'link_relay', {
    relay_to:     to || 'unknown',
    utm_source:   params.get('utm_source')   || '(direct)',
    utm_medium:   params.get('utm_medium')   || '(none)',
    utm_campaign: params.get('utm_campaign') || '(none)',
  });

  setTimeout(() => location.replace(dest), 300);
}

go();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f1117;color:#eef0ff;font-family:system-ui,sans-serif;}
.wrap{text-align:center;}
.spinner{width:32px;height:32px;border:3px solid #252a42;border-top-color:#7c83fc;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
p{font-size:14px;color:#5a6080;}
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <p>이동 중...</p>
</div>
</body>
</html>
